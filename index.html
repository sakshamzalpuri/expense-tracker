<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finance Tracker - JS Focus</title>

  <!-- Styles -->
  <link rel="stylesheet" href="src/styles/variables.css" />
  <link rel="stylesheet" href="src/styles/base.css" />
  <link rel="stylesheet" href="src/styles/layout.css" />
  <link rel="stylesheet" href="src/styles/components.css" />
</head>

<body>

  <div class="app">
<header class="navbar">
  <div class="nav-left">
    <a class="logo" href="#">Finance Tracker</a>
  </div>

  <div class="nav-right">
    <button id="toggleForm" class="nav-btn">
      + Add Transaction
    </button>
  </div>
</header>

<main>
   <!-- Summary -->
  <section class="summary">
    <div>
      <h3>Total Balance</h3>
      <p id="totalBalance">0</p>
    </div>

    <div>
      <h3>Total Income</h3>
      <p id="totalIncome">0</p>
    </div>

    <div>
      <h3>Total Expense</h3>
      <p id="totalExpense">0</p>
    </div>
  </section>

  <!-- Transactions List -->
  <section class="transactions">
    <h2>Transactions</h2>
    <ul id="transactionList"></ul>
  </section>
</main>

  <!-- Transaction Form Modal -->
  <section class="form-container toggle-form">

   <form id="transactionForm" class="transaction-form" novalidate>
      <button type="button" class="cross">X</button>

      <h2>Add Transaction</h2>

      <!-- Type Toggle -->
      <div class="type-toggle">
        <button type="button" id="income" class="active">
        Income
        </button>
        <button type="button" id="expense">
          Expense
        </button>
      </div>
      

      <!-- Transaction Name -->
      <div class="form-group">
        <label for="transactionName">Transaction Name</label>
        <input
          type="text"
          id="transactionName"
          placeholder="e.g. Weekly Groceries"
          name="title"
          required
        />
      </div>

      <!-- Amount & Date -->
      <div class="form-row">

        <div class="form-group">
          <label for="amount">Amount</label>
          <input
            type="number"
            id="amount"
            placeholder="0.00"
            name="amount"
            required
          />
        </div>

        <div class="form-group">
          <label for="date">Date</label>
          <input
            type="date"
            id="date"
            name="date"
            required
          />
        </div>

      </div>

      <!-- Category -->
      <div class="form-group">
        <label for="category">Category</label>
        <select id="category" name="category">
          <option value="food">Food</option>
          <option value="shopping">Shopping</option>
          <option value="salary">Salary</option>
        </select>
      </div>

      <!-- Submit -->
      <button type="submit" id="transactionBtn">
        Save Transaction
      </button>

    </form>

  </section>

  <!-- Script -->
  <script type="module" src="./src/script/main.js"></script>

</body>
</html>
